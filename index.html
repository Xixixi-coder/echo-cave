<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>回声洞穴 Echo Cave v9 — App Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=LXGW+WenKai:wght@300;400&display=swap" rel="stylesheet">
<script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#faf6f1;
  --bg-warm:#f5ebe0;
  --card:#fff;
  --text:#2d2a26;
  --text-sub:#8a8278;
  --text-light:#b5ae a3;
  --gold:#c4a574;
  --gold-warm:#d4a96a;
  --peach:#e8b89d;
  --rose:#c87e6e;
  --gentle:#9b8ec4;
  --accent:#c75b5b;
  --blue:#7b9eb8;
  --green:#8bab7e;
  --cream:#f0e6d2;
  --shadow:0 2px 16px rgba(0,0,0,0.06);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.08);
  --radius:20px;
  --radius-sm:12px;
  --font-serif:'Noto Serif SC',serif;
  --font-sans:'Noto Sans SC',sans-serif;
  --font-wen:'LXGW WenKai',serif;
  --safe-top:env(safe-area-inset-top,44px);
  --safe-bottom:env(safe-area-inset-bottom,20px);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--font-sans);color:var(--text);-webkit-tap-highlight-color:transparent;}

/* === PHONE FRAME === */
.app{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);}

/* === STATUS BAR SPACER === */
.status-bar{height:var(--safe-top);flex-shrink:0;}

/* === SCREENS === */
.screen{flex:1;display:none;flex-direction:column;overflow:hidden;position:relative;}
.screen.active{display:flex;}

/* === TAB BAR === */
.tab-bar{
  display:flex;justify-content:space-around;align-items:center;
  padding:8px 0 calc(8px + var(--safe-bottom));
  background:rgba(250,246,241,0.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(0,0,0,0.04);
  flex-shrink:0;
}
.tab{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:4px 16px;cursor:pointer;transition:all .2s;
}
.tab-icon{font-size:22px;opacity:.35;transition:all .2s;}
.tab-label{font-size:10px;color:var(--text-sub);opacity:.5;transition:all .2s;}
.tab.active .tab-icon{opacity:1;}
.tab.active .tab-label{opacity:1;color:var(--gold-warm);font-weight:500;}
.tab.active::after{content:'';display:block;width:4px;height:4px;border-radius:50%;background:var(--gold-warm);margin-top:1px;}

/* ================================================
   HOME SCREEN — 今日
   ================================================ */
.home-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 20px 20px;}

/* Header */
.home-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px;padding-top:8px;}
.home-greeting{font-family:var(--font-serif);font-size:28px;font-weight:700;line-height:1.3;}
.home-greeting em{font-style:italic;font-weight:200;color:var(--gold-warm);}
.home-date{font-size:11px;color:var(--text-sub);letter-spacing:1px;}

/* Today card — like meditation app */
.today-card{
  background:linear-gradient(135deg,#f5ebe0 0%,#edd5bf 50%,#e8c9ab 100%);
  border-radius:var(--radius);padding:28px 24px;margin-bottom:20px;
  position:relative;overflow:hidden;
}
.today-card::before{
  content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;
  border-radius:50%;background:rgba(255,255,255,0.15);
}
.today-card::after{
  content:'';position:absolute;bottom:-20px;left:30px;width:80px;height:80px;
  border-radius:50%;background:rgba(255,255,255,0.08);
}
.today-tag{
  display:inline-block;font-size:10px;letter-spacing:1.5px;
  color:var(--rose);font-weight:500;margin-bottom:12px;
}
.today-tag::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--rose);margin-right:6px;vertical-align:middle;}
.today-title{font-family:var(--font-serif);font-size:24px;font-weight:700;line-height:1.4;margin-bottom:8px;}
.today-title em{font-style:italic;font-weight:200;}
.today-desc{font-size:13px;color:rgba(45,42,38,0.6);line-height:1.7;font-family:var(--font-wen);}

/* Streak card */
.streak-card{
  background:var(--card);border-radius:var(--radius);padding:20px 24px;
  box-shadow:var(--shadow);margin-bottom:20px;
}
.streak-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;}
.streak-label{font-size:11px;letter-spacing:1px;color:var(--text-sub);text-transform:uppercase;}
.streak-num{font-family:var(--font-serif);font-size:36px;font-weight:700;color:var(--gold-warm);}
.streak-sub{font-size:12px;color:var(--text-sub);font-family:var(--font-wen);}
.streak-dots{display:flex;gap:8px;margin-top:12px;justify-content:center;}
.streak-dot{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;color:var(--text-sub);
  background:rgba(196,165,116,0.08);transition:all .3s;
}
.streak-dot.filled{background:var(--gold-warm);color:#fff;}
.streak-dot.today{border:2px solid var(--gold-warm);background:rgba(196,165,116,0.15);}

/* Quick actions */
.quick-section{margin-bottom:20px;}
.quick-title{font-size:13px;font-weight:500;margin-bottom:12px;color:var(--text-sub);}
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.quick-card{
  background:var(--card);border-radius:16px;padding:20px 16px;
  box-shadow:var(--shadow);cursor:pointer;transition:all .2s;
}
.quick-card:active{transform:scale(.97);}
.quick-card-icon{font-size:28px;margin-bottom:10px;}
.quick-card-title{font-family:var(--font-serif);font-size:15px;font-weight:600;margin-bottom:4px;}
.quick-card-desc{font-size:11px;color:var(--text-sub);line-height:1.5;}

/* ================================================
   ASK SCREEN — 问她
   ================================================ */
.ask-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 20px;}
.ask-top{text-align:center;padding:20px 0 16px;}
.ask-title{font-family:var(--font-serif);font-size:22px;font-weight:700;margin-bottom:4px;}
.ask-sub{font-size:12px;color:var(--text-sub);font-family:var(--font-wen);}

/* Emotion dots — OH Cards style */
.emotion-picker{display:flex;justify-content:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;padding:0 10px;}
.emotion-dot{
  width:36px;height:36px;border-radius:50%;cursor:pointer;
  transition:all .3s;border:2.5px solid transparent;position:relative;
}
.emotion-dot.selected{border-color:var(--text);transform:scale(1.15);}
.emotion-dot::after{
  content:attr(data-label);position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);
  font-size:9px;color:var(--text-sub);white-space:nowrap;opacity:0;transition:opacity .2s;
}
.emotion-dot.selected::after{opacity:1;}

/* Voice area */
.ask-voice-area{display:flex;flex-direction:column;align-items:center;margin:24px 0;}
.ask-voice-btn{
  width:88px;height:88px;border-radius:50%;
  background:linear-gradient(135deg,var(--cream) 0%,var(--peach) 100%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(200,160,120,0.2);
  transition:all .3s;position:relative;cursor:pointer;
}
.ask-voice-btn::before{
  content:'';position:absolute;inset:-6px;border-radius:50%;
  border:1.5px dashed rgba(196,165,116,0.3);
  animation:spinSlow 12s linear infinite;
}
@keyframes spinSlow{to{transform:rotate(360deg)}}
.ask-voice-btn.recording{
  background:linear-gradient(135deg,#e8b89d,#c75b5b);
  box-shadow:0 4px 30px rgba(199,91,91,0.25);
  animation:recPulse 1.5s ease-in-out infinite;
}
@keyframes recPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.ask-voice-icon{font-size:32px;}
.ask-voice-hint{margin-top:14px;font-size:12px;color:var(--text-sub);font-family:var(--font-wen);}

/* Text input */
.ask-input-area{
  display:flex;align-items:center;gap:10px;padding:6px 6px 6px 18px;
  background:var(--card);border-radius:28px;box-shadow:var(--shadow);
  margin:0 0 16px;
}
.ask-input{flex:1;border:none;background:transparent;font-size:15px;color:var(--text);font-family:var(--font-sans);outline:none;padding:10px 0;}
.ask-input::placeholder{color:rgba(0,0,0,0.2);}
.ask-send{
  width:38px;height:38px;border-radius:50%;border:none;
  background:linear-gradient(135deg,var(--gold-warm),var(--peach));
  color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;
}
.ask-send:active{transform:scale(.9);}

/* Guide pills */
.guide-pills{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:20px;}
.guide-pill{
  padding:8px 18px;border-radius:20px;
  background:rgba(196,165,116,0.08);
  color:var(--text-sub);font-size:13px;font-family:var(--font-wen);
  cursor:pointer;transition:all .2s;border:1px solid transparent;
}
.guide-pill:active{background:rgba(196,165,116,0.2);border-color:var(--gold);color:var(--text);}

/* ================================================
   STORY SCREEN — 她的故事 (card-based, overlapping)
   ================================================ */
.story-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 20px 20px;}
.story-top-nav{display:flex;justify-content:space-between;align-items:center;padding:8px 0 16px;}
.story-back{font-size:13px;color:var(--text-sub);cursor:pointer;padding:8px;}
.story-share{font-size:13px;color:var(--gold-warm);cursor:pointer;padding:8px;}

/* Overlapping story cards — like Post Post */
.story-cards-stack{position:relative;margin-bottom:24px;min-height:200px;}
.story-card-bg{
  position:absolute;top:12px;left:12px;right:-4px;bottom:-8px;
  background:var(--cream);border-radius:var(--radius);
  transform:rotate(2deg);box-shadow:var(--shadow);
}
.story-card-main{
  position:relative;background:var(--card);border-radius:var(--radius);
  padding:28px 24px;box-shadow:var(--shadow-lg);
  transform:rotate(-1deg);
}
.story-her-name{font-family:var(--font-serif);font-size:22px;font-weight:700;margin-bottom:2px;}
.story-her-year{font-size:12px;color:var(--text-sub);margin-bottom:16px;letter-spacing:1px;}
.story-quote-text{
  font-family:var(--font-serif);font-size:18px;font-weight:600;
  line-height:1.8;color:var(--rose);font-style:italic;
}

/* Narrative */
.story-narrative-section{margin-bottom:20px;}
.narrative-part{
  font-family:var(--font-wen);font-size:15px;color:rgba(45,42,38,0.75);
  line-height:2;margin-bottom:14px;
  opacity:0;transform:translateY(10px);
  transition:all .8s cubic-bezier(.25,.46,.45,.94);
}
.narrative-part.visible{opacity:1;transform:translateY(0);}
.narrative-part:first-child{color:var(--gentle);font-style:italic;}

/* Back to you — receipt style */
.back-to-you-card{
  background:var(--bg-warm);border-radius:16px;padding:20px 20px 20px 24px;
  border-left:4px solid var(--gentle);margin-bottom:20px;
  opacity:0;transform:translateY(10px);transition:all .8s;
}
.back-to-you-card.visible{opacity:1;transform:translateY(0);}
.back-to-you-label{font-size:10px;letter-spacing:2px;color:var(--gentle);margin-bottom:8px;text-transform:uppercase;}
.back-to-you-text{font-family:var(--font-wen);font-size:15px;color:var(--text);line-height:1.9;font-style:italic;}

/* Story actions */
.story-btn-row{display:flex;gap:12px;}
.story-btn{
  flex:1;padding:14px;border-radius:16px;text-align:center;
  font-size:14px;font-family:var(--font-wen);cursor:pointer;transition:all .2s;
}
.story-btn:active{transform:scale(.96);}
.story-btn.outline{background:var(--card);border:1px solid rgba(0,0,0,0.06);color:var(--text-sub);box-shadow:var(--shadow);}
.story-btn.filled{background:linear-gradient(135deg,var(--gold-warm),var(--peach));color:#fff;box-shadow:0 4px 16px rgba(200,160,120,0.25);}

/* ================================================
   CAVE SCREEN — 我的洞穴
   ================================================ */
.cave-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 20px 20px;}
.cave-top{text-align:center;padding:16px 0 24px;}
.cave-title{font-family:var(--font-serif);font-size:26px;font-weight:700;}
.cave-sub{font-size:12px;color:var(--text-sub);margin-top:4px;font-family:var(--font-wen);}

/* Stats row */
.cave-stats-row{display:flex;gap:12px;margin-bottom:24px;}
.cave-stat-card{
  flex:1;background:var(--card);border-radius:16px;padding:16px;
  text-align:center;box-shadow:var(--shadow);
}
.cave-stat-num{font-family:var(--font-serif);font-size:28px;font-weight:700;color:var(--gold-warm);}
.cave-stat-label{font-size:10px;color:var(--text-sub);margin-top:4px;letter-spacing:1px;}

/* Entry list */
.cave-section-title{font-size:12px;letter-spacing:2px;color:var(--text-sub);margin-bottom:12px;}
.cave-entry-card{
  background:var(--card);border-radius:16px;padding:16px 18px;
  box-shadow:var(--shadow);margin-bottom:10px;
}
.cave-entry-input{font-size:14px;color:var(--text);margin-bottom:6px;font-family:var(--font-wen);}
.cave-entry-resp{font-size:12px;color:var(--gentle);font-style:italic;line-height:1.6;}
.cave-entry-meta{display:flex;justify-content:space-between;margin-top:8px;}
.cave-entry-name{font-size:10px;color:var(--gold-warm);font-weight:500;}
.cave-entry-time{font-size:10px;color:rgba(0,0,0,0.15);}

/* ================================================
   POSTER OVERLAY
   ================================================ */
#poster-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.6);backdrop-filter:blur(20px);display:none;align-items:center;justify-content:center;flex-direction:column;padding:20px;}
#poster-overlay.active{display:flex;}
#poster-overlay img{max-width:280px;border-radius:16px;box-shadow:var(--shadow-lg);}
.poster-save-btn{margin-top:20px;padding:12px 32px;border-radius:24px;background:var(--card);color:var(--text);font-size:14px;box-shadow:var(--shadow);cursor:pointer;}
.poster-close-btn{margin-top:14px;font-size:12px;color:rgba(255,255,255,0.5);cursor:pointer;}
#poster-canvas{display:none;}

/* === RIPPLE CANVAS === */
canvas#ripple-layer{position:fixed;inset:0;z-index:100;pointer-events:none;}

/* === AI LOADING STATE === */
.ai-loading{display:flex;flex-direction:column;align-items:center;padding:60px 20px;gap:20px;}
.ai-pulse{width:24px;height:24px;border-radius:50%;background:var(--gold-warm);animation:aiPulse 2s ease-in-out infinite;box-shadow:0 0 40px rgba(212,169,106,0.3);}
@keyframes aiPulse{0%,100%{transform:scale(1);opacity:0.6;}50%{transform:scale(1.4);opacity:1;}}
.ai-loading-text{font-family:var(--font-wen);font-size:14px;color:var(--text-sub);animation:fadeInOut 2.5s ease-in-out infinite;}
@keyframes fadeInOut{0%,100%{opacity:0.4;}50%{opacity:1;}}
.typing-cursor{color:var(--gold-warm);animation:blink 1s step-end infinite;font-weight:300;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
</style>
</head>
<body>

<canvas id="ripple-layer"></canvas>

<div class="app">
  <div class="status-bar"></div>

  <!-- ====== HOME ====== -->
  <div class="screen active" id="screen-home">
    <div class="home-scroll">
      <div class="home-header">
        <div>
          <div class="home-greeting">在洞穴里，<br>找到 <em>她的回声。</em></div>
        </div>
        <div class="home-date" id="home-date"></div>
      </div>

      <div class="today-card" onclick="switchTab('ask')">
        <div class="today-tag">TODAY</div>
        <div class="today-title">问她一个 <em>问题。</em></div>
        <div class="today-desc">你的困惑，她在一百年前就感受过。<br>按住说话，或者打字问她。</div>
      </div>

      <div class="streak-card">
        <div class="streak-header">
          <div><div class="streak-label">洞穴足迹</div><div class="streak-sub" id="streak-sub"></div></div>
          <div class="streak-num" id="streak-num">0</div>
        </div>
        <div class="streak-dots" id="streak-dots"></div>
      </div>

      <div class="quick-section">
        <div class="quick-title">探索</div>
        <div class="quick-grid">
          <div class="quick-card" onclick="switchTab('ask')">
            <div class="quick-card-icon">🕯️</div>
            <div class="quick-card-title">问她</div>
            <div class="quick-card-desc">说出你的困惑，让涟漪找到她</div>
          </div>
          <div class="quick-card" onclick="switchTab('cave')">
            <div class="quick-card-icon">🌌</div>
            <div class="quick-card-title">我的洞穴</div>
            <div class="quick-card-desc">你曾说过的话，她的每一次回应</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ====== ASK ====== -->
  <div class="screen" id="screen-ask">
    <div class="ask-scroll">
      <div class="ask-top">
        <div class="ask-title">问她</div>
        <div class="ask-sub">选择你此刻的情绪色彩</div>
      </div>

      <div class="emotion-picker" id="emotion-picker">
        <div class="emotion-dot" style="background:#c75b5b" data-label="愤怒" data-idx="0" onclick="pickEmotion(this)"></div>
        <div class="emotion-dot" style="background:#7b9eb8" data-label="悲伤" data-idx="1" onclick="pickEmotion(this)"></div>
        <div class="emotion-dot" style="background:#d4a96a" data-label="希望" data-idx="2" onclick="pickEmotion(this)"></div>
        <div class="emotion-dot" style="background:#e8b89d" data-label="爱" data-idx="3" onclick="pickEmotion(this)"></div>
        <div class="emotion-dot" style="background:#9b8ec4" data-label="迷茫" data-idx="4" onclick="pickEmotion(this)"></div>
        <div class="emotion-dot" style="background:#c87e6e" data-label="反抗" data-idx="5" onclick="pickEmotion(this)"></div>
        <div class="emotion-dot" style="background:#8bab7e" data-label="自由" data-idx="6" onclick="pickEmotion(this)"></div>
        <div class="emotion-dot" style="background:#b5aea3" data-label="疲惫" data-idx="7" onclick="pickEmotion(this)"></div>
      </div>

      <div class="ask-voice-area">
        <div class="ask-voice-btn" id="voice-btn" ontouchstart="startVoice(event)" ontouchend="stopVoice(event)" onmousedown="startVoice(event)" onmouseup="stopVoice(event)">
          <span class="ask-voice-icon" id="voice-icon">🎙️</span>
        </div>
        <div class="ask-voice-hint" id="voice-hint">按住说话，让她听见</div>
      </div>

      <div class="ask-input-area">
        <input class="ask-input" id="text-input" type="text" placeholder="或者打字问她..." onkeydown="if(event.key==='Enter')sendText()">
        <button class="ask-send" onclick="sendText()">↑</button>
      </div>

      <div class="guide-pills" id="guide-pills"></div>
    </div>
  </div>

  <!-- ====== STORY ====== -->
  <div class="screen" id="screen-story">
    <div class="story-scroll">
      <div class="story-top-nav">
        <div class="story-back" onclick="switchTab('ask')">← 返回</div>
        <div class="story-share" onclick="generatePoster()">分享</div>
      </div>

      <div class="story-cards-stack">
        <div class="story-card-bg"></div>
        <div class="story-card-main">
          <div class="story-her-name" id="s-name"></div>
          <div class="story-her-year" id="s-year"></div>
          <div class="story-quote-text" id="s-quote"></div>
        </div>
      </div>

      <div class="story-narrative-section" id="s-narrative"></div>

      <div class="back-to-you-card" id="s-bty-card">
        <div class="back-to-you-label">回到你</div>
        <div class="back-to-you-text" id="s-bty"></div>
      </div>

      <div class="story-btn-row">
        <div class="story-btn outline" onclick="switchTab('ask')">继续问她</div>
        <div class="story-btn filled" onclick="generatePoster()">生成海报</div>
      </div>
    </div>
  </div>

  <!-- ====== CAVE ====== -->
  <div class="screen" id="screen-cave">
    <div class="cave-scroll">
      <div class="cave-top">
        <div class="cave-title">我的洞穴</div>
        <div class="cave-sub">每一次诉说，都被洞穴记住</div>
      </div>

      <div class="cave-stats-row" id="cave-stats"></div>
      <div id="cave-entries"></div>
    </div>
  </div>

  <!-- TAB BAR -->
  <div class="tab-bar">
    <div class="tab active" data-screen="home" onclick="switchTab('home')">
      <div class="tab-icon">🏠</div><div class="tab-label">今日</div>
    </div>
    <div class="tab" data-screen="ask" onclick="switchTab('ask')">
      <div class="tab-icon">🕯️</div><div class="tab-label">问她</div>
    </div>

// ============================================================
//  RIPPLE ENGINE (warm version)
// ============================================================
const RL=document.getElementById('ripple-layer'),rCtx=RL.getContext('2d');
let rW,rH;
function rR(){rW=RL.width=innerWidth;rH=RL.height=innerHeight;}
addEventListener('resize',rR);rR();

let ripples=[];
class WarmRipple{
  constructor(x,y,color){this.x=x;this.y=y;this.rings=[];this.color=color||'196,165,116';
    for(let i=0;i<3;i++)setTimeout(()=>{this.rings.push({r:0,op:.5,w:3,born:performance.now()});haptic('light');},i*500);
  }
  update(now){
    for(const r of this.rings){const age=(now-r.born)/1000;if(age<0)continue;r.r+=2+age*.6;r.op=Math.max(0,.5-age*.25);r.w=Math.max(.2,3-age*1.5);}
    this.rings=this.rings.filter(r=>r.op>0);
  }
  draw(ctx){for(const r of this.rings){if(r.op<=0)continue;ctx.beginPath();ctx.arc(this.x,this.y,r.r,0,Math.PI*2);ctx.strokeStyle=`rgba(${this.color},${r.op})`;ctx.lineWidth=r.w;ctx.stroke();}}
  isDead(){return this.rings.length===0;}
}

document.addEventListener('touchstart',e=>{
  const t=e.touches[0];
  const colors=['196,165,116','199,91,91','123,158,184','155,142,196','200,126,110'];
  ripples.push(new WarmRipple(t.clientX,t.clientY,colors[Math.floor(Math.random()*colors.length)]));
},{passive:true});

function renderRipples(){
  rCtx.clearRect(0,0,rW,rH);
  const now=performance.now();
  for(const r of ripples){r.update(now);r.draw(rCtx);}
  ripples=ripples.filter(r=>!r.isDead());
  requestAnimationFrame(renderRipples);
}
renderRipples();

function analyzeEmotion(text){const v=[0,0,0,0,0,0];for(let d=0;d<6;d++)for(const w of emotionDict[d])if(text.includes(w))v[d]++;const mx=Math.max(...v,1);const n=v.map(x=>x/mx);if(n.every(x=>x===0)){n[4]=0.5;}return n;}
function cosSim(a,b){let d=0,ma=0,mb=0;for(let i=0;i<a.length;i++){d+=a[i]*b[i];ma+=a[i]*a[i];mb+=b[i]*b[i];}return(ma&&mb)?d/(Math.sqrt(ma)*Math.sqrt(mb)):0;}
function findMatch(text){
  const v=analyzeEmotion(text);
  if(selEmotion>=0&&selEmotion<6)v[selEmotion]=Math.max(v[selEmotion],0.8);
  let best=-1,bi=-1;
  for(let i=0;i<stories.length;i++){if(usedIdx.has(i))continue;const s=stories[i];let kw=0;for(const k of s.keywords)if(text.includes(k))kw+=.3;kw=Math.min(kw,1);const sc=kw*.4+cosSim(v,s.emotionVector)*.6;if(sc>best){best=sc;bi=i;}}
  if(bi<0){const u=[];for(let i=0;i<stories.length;i++)if(!usedIdx.has(i))u.push(i);if(u.length)bi=u[Math.floor(Math.random()*u.length)];}
  return bi;
}

let aiGenerating=false;

async function sendText(){
  const inp=document.getElementById('text-input');const text=inp.value.trim();if(!text||aiGenerating)return;
  lastInput=text;inp.value='';haptic('medium');

  if(AI_CONFIG.enabled){
    await generateWithAI(text);
  } else {
    fallbackLocal(text);
  }
}

function fallbackLocal(text){
  const idx=findMatch(text);if(idx<0)return;
  usedIdx.add(idx);currentStory=stories[idx];
  mem.totalAwakened++;
  mem.entries.push({input:text,story:currentStory.her.name,quote:currentStory.her.quote,backToYou:currentStory.narrative.backToYou,time:new Date().toISOString()});
  saveMem();
  showStory(currentStory);
}

async function generateWithAI(text){
  aiGenerating=true;
  haptic('heavy');
  switchTab('story');
  showLoadingState();

  const emotionVector=analyzeEmotion(text);
  if(selEmotion>=0&&selEmotion<6)emotionVector[selEmotion]=Math.max(emotionVector[selEmotion],0.8);

  try{
    const res=await fetch(AI_CONFIG.apiUrl,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({userText:text,emotionVector})
    });

    if(!res.ok)throw new Error('API error');

    const reader=res.body.getReader();
    const decoder=new TextDecoder();
    let buffer='',fullContent='';

    while(true){
      const{done,value}=await reader.read();
      if(done)break;
      buffer+=decoder.decode(value,{stream:true});
      const lines=buffer.split('\n');
      buffer=lines.pop()||'';
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        const data=line.slice(6);
        if(data==='[DONE]')break;
        try{
          const parsed=JSON.parse(data);
          if(parsed.error)throw new Error(parsed.error);
          if(parsed.content){
            fullContent+=parsed.content;
            updateStreamingDisplay(fullContent);
          }
        }catch(e){if(e.message!=='[DONE]')console.warn(e);}
      }
    }

    const story=parseAIResponse(fullContent);
    if(story){
      currentStory={her:{name:story.protagonist,year:story.year,region:story.region,quote:story.quote},narrative:{opening:story.opening,struggle:story.story,process:'',breakthrough:'',legacy:'',backToYou:story.backToYou},keywords:story.keywords||[]};
      mem.totalAwakened++;
      mem.entries.push({input:text,story:story.protagonist,quote:story.quote,backToYou:story.backToYou,time:new Date().toISOString()});
      saveMem();
      showStoryFinal(story);
    }
  }catch(e){
    console.warn('AI failed, falling back:',e);
    fallbackLocal(text);
  }finally{
    aiGenerating=false;
  }
}

function parseAIResponse(content){
  try{
    const jsonMatch=content.match(/\{[\s\S]*\}/);
    if(!jsonMatch)return null;
    return JSON.parse(jsonMatch[0]);
  }catch(e){return null;}
}

// ============================================================
//  STORY DISPLAY — STREAMING
// ============================================================
function showLoadingState(){
  document.getElementById('s-name').textContent='';
  document.getElementById('s-year').textContent='';
  document.getElementById('s-quote').textContent='';
  document.getElementById('s-narrative').innerHTML='<div class="ai-loading"><div class="ai-pulse"></div><div class="ai-loading-text">她正在跨越时空寻找回声…</div></div>';
  document.getElementById('s-bty').textContent='';
  document.getElementById('s-bty-card').classList.remove('visible');
}

function updateStreamingDisplay(content){
  const narr=document.getElementById('s-narrative');
  // Try to extract partial JSON for preview
  const quoteM=content.match(/"quote"\s*:\s*"([^"]*?)"/);
  const nameM=content.match(/"protagonist"\s*:\s*"([^"]*?)"/);
  const storyM=content.match(/"story"\s*:\s*"([\s\S]*?)(?:"|$)/);

  if(nameM)document.getElementById('s-name').textContent=nameM[1];
  if(quoteM)document.getElementById('s-quote').textContent=`「${quoteM[1]}」`;

  if(storyM){
    const partial=storyM[1].replace(/\\n/g,'\n').replace(/\\"/g,'"');
    narr.innerHTML=`<div class="narrative-part visible" style="opacity:0.8">${partial}<span class="typing-cursor">|</span></div>`;
  }
}

function showStoryFinal(s){
  document.getElementById('s-name').textContent=s.protagonist;
  document.getElementById('s-year').textContent=`${s.year} · ${s.region||''}`;
  document.getElementById('s-quote').textContent=`「${s.quote}」`;

  const narr=document.getElementById('s-narrative');narr.innerHTML='';
  const parts=[s.opening,s.story].filter(Boolean);
  parts.forEach((t,i)=>{const p=document.createElement('div');p.className='narrative-part';p.textContent=t;narr.appendChild(p);setTimeout(()=>p.classList.add('visible'),200+i*600);});

  const bty=document.getElementById('s-bty');bty.textContent=s.backToYou;
  const btyCard=document.getElementById('s-bty-card');btyCard.classList.remove('visible');
  setTimeout(()=>{btyCard.classList.add('visible');haptic('confirm');},200+parts.length*600+400);
}

function showStory(s){
  haptic('heavy');
  switchTab('story');
  document.getElementById('s-name').textContent=s.her.name;
  document.getElementById('s-year').textContent=`${s.her.year} · ${s.her.region}`;
  document.getElementById('s-quote').textContent=`「${s.her.quote}」`;
  const narr=document.getElementById('s-narrative');narr.innerHTML='';
  const parts=[s.narrative.opening,s.narrative.struggle,s.narrative.process,s.narrative.breakthrough,s.narrative.legacy].filter(Boolean);
  parts.forEach((t,i)=>{const p=document.createElement('div');p.className='narrative-part';p.textContent=t;narr.appendChild(p);setTimeout(()=>p.classList.add('visible'),400+i*800);});
  const bty=document.getElementById('s-bty');bty.textContent=s.narrative.backToYou;
  const btyCard=document.getElementById('s-bty-card');btyCard.classList.remove('visible');
  setTimeout(()=>{btyCard.classList.add('visible');haptic('confirm');},400+parts.length*800+500);
}

// ============================================================
//  GUIDE
// ============================================================
function showGuide(){
  const set=guideWords[Math.floor(Math.random()*guideWords.length)];
  document.getElementById('guide-pills').innerHTML=set.map(w=>`<div class="guide-pill" onclick="useGuide('${w}')">${w}</div>`).join('');
}
function useGuide(w){document.getElementById('text-input').value=w;sendText();}

// ============================================================
//  CAVE
// ============================================================
function renderCave(){
  document.getElementById('cave-stats').innerHTML=`<div class="cave-stat-card"><div class="cave-stat-num">${mem.entries.length}</div><div class="cave-stat-label">次诉说</div></div><div class="cave-stat-card"><div class="cave-stat-num">${mem.totalAwakened}</div><div class="cave-stat-label">个唤醒</div></div><div class="cave-stat-card"><div class="cave-stat-num">${mem.days.length}</div><div class="cave-stat-label">天到访</div></div>`;
  const el=document.getElementById('cave-entries');
  if(!mem.entries.length){el.innerHTML='<div style="text-align:center;padding:40px;color:var(--text-sub);font-size:14px;font-family:var(--font-wen)">还没有诉说。去问她吧。</div>';return;}
  let h='<div class="cave-section-title">你曾说过</div>';
  mem.entries.slice(-10).reverse().forEach(e=>{h+=`<div class="cave-entry-card"><div class="cave-entry-input">「${e.input}」</div><div class="cave-entry-resp">${e.story}：${e.backToYou}</div><div class="cave-entry-meta"><span class="cave-entry-name">${e.story}</span><span class="cave-entry-time">${new Date(e.time).toLocaleDateString('zh-CN')}</span></div></div>`;});
  el.innerHTML=h;
}

// ============================================================
//  POSTER — 觉醒者风格（洞穴墨蓝 + 锈红 + 暖金）
// ============================================================
function generatePoster(){
  if(!currentStory)return;haptic('heavy');
  const c=document.getElementById('poster-canvas'),ctx=c.getContext('2d'),W=540,H=960;c.width=W;c.height=H;

  // 洞穴深色背景渐变
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#1A1A2E');bg.addColorStop(0.6,'#16213E');bg.addColorStop(1,'#0F0F1A');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // 岩壁纹理（颗粒噪点）
  for(let i=0;i<4000;i++){
    const a=Math.random()*0.03;
    ctx.fillStyle=`rgba(245,240,232,${a})`;
    ctx.fillRect(Math.random()*W,Math.random()*H,1,1);
  }

  // 顶部光束（暖金光晕）
  const beam=ctx.createRadialGradient(W/2,80,10,W/2,80,200);
  beam.addColorStop(0,'rgba(232,213,183,0.12)');beam.addColorStop(1,'rgba(232,213,183,0)');
  ctx.fillStyle=beam;ctx.fillRect(0,0,W,280);

  // 声波同心圆装饰（淡金）
  ctx.strokeStyle='rgba(232,213,183,0.06)';ctx.lineWidth=0.5;
  for(let i=1;i<=5;i++){ctx.beginPath();ctx.arc(W/2,H*0.35,40*i,0,Math.PI*2);ctx.stroke();}

  // 品牌标题
  ctx.font='600 16px "Noto Serif SC",serif';ctx.fillStyle='rgba(245,240,232,0.5)';ctx.textAlign='center';
  ctx.fillText('回声洞穴',W/2,80);
  ctx.font='300 9px sans-serif';ctx.fillStyle='rgba(245,240,232,0.25)';
  ctx.fillText('ECHO CAVE',W/2,98);

  // 分割点
  ctx.fillStyle='rgba(232,213,183,0.4)';ctx.beginPath();ctx.arc(W/2,130,2,0,Math.PI*2);ctx.fill();

  // 用户输入
  ctx.font='300 13px "Noto Sans SC",sans-serif';ctx.fillStyle='rgba(245,240,232,0.45)';
  ctx.fillText('我说：',W/2,175);
  ctx.font='400 17px "LXGW WenKai",serif';ctx.fillStyle='#F5F0E8';
  wrapText(ctx,`「${lastInput}」`,W/2,210,W-100,28);

  // 金色分割线
  ctx.strokeStyle='rgba(232,213,183,0.2)';ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(W*0.2,310);ctx.lineTo(W*0.8,310);ctx.stroke();

  // 觉醒者名字
  ctx.font='500 14px "Noto Sans SC",sans-serif';ctx.fillStyle='rgba(245,240,232,0.5)';
  ctx.fillText(`${currentStory.her.name}，${currentStory.her.year}`,W/2,355);

  // 金句（锈红色，大字）
  ctx.font='700 24px "Noto Serif SC",serif';ctx.fillStyle='#C45C3E';
  const quoteY=wrapText(ctx,`「${currentStory.her.quote}」`,W/2,405,W-80,36);

  // 回到你（暖金色，小字）
  const btyStartY=Math.max(quoteY+60,520);
  ctx.font='400 14px "LXGW WenKai",serif';ctx.fillStyle='rgba(245,240,232,0.55)';
  wrapText(ctx,currentStory.narrative.backToYou,W/2,btyStartY,W-100,24);

  // 底部声波水印
  ctx.strokeStyle='rgba(232,213,183,0.04)';ctx.lineWidth=1;
  for(let i=0;i<30;i++){
    const x=W*0.15+i*(W*0.7/30);
    const h2=8+Math.sin(i*0.5)*6;
    ctx.beginPath();ctx.moveTo(x,H-100-h2);ctx.lineTo(x,H-100+h2);ctx.stroke();
  }

  // 底部文案
  ctx.font='300 11px "Noto Sans SC",sans-serif';ctx.fillStyle='rgba(245,240,232,0.3)';
  ctx.fillText('你的不安不是病，是你还活着的证据',W/2,H-65);
  ctx.font='300 9px "Noto Sans SC",sans-serif';ctx.fillStyle='rgba(245,240,232,0.15)';
  ctx.fillText('#回声洞穴 #觉醒者 #'+currentStory.her.name,W/2,H-45);

  document.getElementById('poster-img').src=c.toDataURL('image/png');document.getElementById('poster-overlay').classList.add('active');
}
function wrapText(ctx,text,x,y,mw,lh){let line='',cy=y;for(const ch of text.split('')){if(ctx.measureText(line+ch).width>mw){ctx.fillText(line,x,cy);line=ch;cy+=lh;}else line+=ch;}ctx.fillText(line,x,cy);return cy;}
function savePoster(){const a=document.createElement('a');a.download=`回声洞穴-${currentStory.her.name}.png`;a.href=document.getElementById('poster-canvas').toDataURL();a.click();haptic('confirm');}
function closePoster(){document.getElementById('poster-overlay').classList.remove('active');}

// ============================================================
function saveMem(){localStorage.setItem(SK,JSON.stringify(mem));}

initHome();
showGuide();
